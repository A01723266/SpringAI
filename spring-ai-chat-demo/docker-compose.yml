services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: spring-ai-chat-demo:local
    container_name: spring-ai-chat-demo-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.2:1b
    extra_hosts:
      - "host.docker.internal:host-gateway"
