apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-ai-chat-demo
  labels:
    app.kubernetes.io/name: spring-ai-chat-demo
    app.kubernetes.io/component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spring-ai-chat-demo
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spring-ai-chat-demo
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: app
          image: spring-ai-chat-demo:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama-service:11434
            - name: OLLAMA_MODEL
              value: llama3.2:1b
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
